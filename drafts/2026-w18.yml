number: 3
title: 'Core Dispatch #3'
slug: 2026-w18
period_start: '2026-04-16'
period_end: '2026-04-30'
editorial_notes: |
  Welcome back to Core Dispatch! This edition covers April 16–30, 2026.
  Python 3.15.0 beta 1 is just around the corner (that's next week...but
  who's counting?). If you've got outstanding features, now's the time,
  or else you'll have to wait for 3.16.0!

  The Steering Council was busy. [PEP
  661](https://peps.python.org/pep-0661/) was accepted
  after nearly five years of discussion.
  [PEP 788](https://peps.python.org/pep-0788/),
  [PEP 829](https://peps.python.org/pep-0829/),
  [PEP 820](https://peps.python.org/pep-0820/), and
  [PEP 831](https://peps.python.org/pep-0831/) also got the green light,
  while [PEP 708](https://peps.python.org/pep-0708/) and
  [PEP 806](https://peps.python.org/pep-0806/) were turned down. Big
  fortnight on the PEP front! It's also a great time to review the 3.15
  [What's New](https://docs.python.org/3.15/whatsnew/3.15.html) to see
  what's coming in the next release (spoiler: it's a lot of really cool
  stuff).

  As always, if you maintain a package or just like living on the edge,
  make sure to give 3.15 beta 1 a spin when it drops next week and
  [file any issues](https://github.com/python/cpython/issues) you find.

  One more thing: this newsletter takes real work to edit and curate.
  If you've got something Python core related to share, or just want to
  help out, please file [an issue on
  GitHub](https://github.com/savannahostrowski/coredispatch.xyz/issues)
  or reach out!
