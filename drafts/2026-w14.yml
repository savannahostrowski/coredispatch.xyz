number: 1
title: 'Core Dispatch #1'
slug: 2026-w14
period_start: '2026-03-20'
period_end: '2026-04-03'
editorial_notes: |
  Welcome to the very first issue of Core Dispatch!

  Three CPython releases land on Monday — 3.13.13, 3.14.4, and 3.15.0a8. PEP 803 was accepted, giving free-threaded builds a stable ABI (big deal for extension authors). And if you missed it, Ken Jin wrote about the JIT getting back on track for 3.15 on the Python blog.

  On Discourse, PEP 829 on startup configuration via `.site.toml` files is on fire with 49 new replies this week, and PEP 803's stable ABI discussion is picking up steam too.

  We're still figuring out the format — if you have feedback, open an issue on [GitHub](https://github.com/savannahostrowski/coredispatch.xyz).
quote:
  text: "Just a friendly reminder that if you want sweet #PyConUS, #PyConCharlas and/or #pyladies t-shirts this year, you have to pre-order by April 14, 2026! To add a t-shirt to your ticket, login to your PyConUS dashboard and t-shirts are under \"Add to your Registration\"."
