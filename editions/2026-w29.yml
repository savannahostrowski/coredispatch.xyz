number: 8
title: 'Core Dispatch #8'
slug: 2026-w29
period_start: '2026-07-05'
period_end: '2026-07-18'
editorial_notes: |
  Welcome back to Core Dispatch! This edition covers July 5 through July 18, 2026.
  Python 3.15.0 beta 4 landed today, July 18 (we just released
  it at the EuroPython sprints!), with 3.13.15, 3.14.7 and the first 3.15
  release candidate following on August 4.

  It's EuroPython week! Much of the core team has been gathered in one place for our annual
  Language Summit (blog posts to come!) and the conference. Recordings aren't up just yet,
  but as promised with the PyCon US talks, once they are, we'll pull talks and Language Summit
  coverage from the team into a future edition.

  On the PEP front, discussion is lively: [PEP 835](https://peps.python.org/pep-0835/)
  (shorthand syntax for `Annotated` metadata) and [PEP 836](https://peps.python.org/pep-0836/)
  ("JIT Go Brrr") are both drawing dozens of new replies, and a few fresh PEPs — including
  [PEP 840](https://peps.python.org/pep-0840/) on name resolution in class namespaces —
  have joined the queue.

  Don't miss the "One More Thing" at the bottom of this edition. This one's a little sillier
  (correction: more unhinged) than usual, but we think you'll enjoy it.

  As always, if you maintain a package or just like living on the edge, give the final
  3.15 beta a spin and [file any issues](https://github.com/python/cpython/issues)
  you find.
