number: 6
title: 'Core Dispatch #6'
slug: 2026-w25
period_start: '2026-06-04'
period_end: '2026-06-19'
editorial_notes: |
  Welcome back to Core Dispatch! This edition covers June 4 through 19, 2026.
  [Python 3.14.6 and 3.13.14](https://blog.python.org/2026/06/python-3146-31314/)
  landed on June 10, and the next milestone is 3.15.0 beta 3 on June 23.

  The big news this fortnight comes from the Steering Council, who put out an
  [announcement on the path forward for the experimental JIT](https://discuss.python.org/t/an-announcement-from-the-steering-council-regarding-the-jit-project/107638).
  The JIT entered CPython's `main` branch as an experiment, alongside the
  Informational [PEP 744](https://peps.python.org/pep-0744/). The Council would
  like to see its path forward worked out through a Standards Track PEP, giving
  the project the explicit, structured conversation it hasn't really had yet
  about what people expect from a JIT, including performance targets, interop
  guarantees, and tooling compatibility.

  On a related note, JIT contributors have opened a thread to
  [gather community perspectives on the JIT](https://discuss.python.org/t/community-perspectives-on-the-jit-experiences-expectations-and-concerns/107737)
  as they begin drafting that PEP. Give it a read, and if you've got
  experiences, expectations, or concerns to share, it's a good place to
  weigh in.

  It's been a bit quieter on the PEP front over the past two weeks, though
  [PEP 835](https://peps.python.org/pep-0835/), a shorthand syntax for `Annotated`
  type metadata, was newly drafted.

  Over on the PSF side, the Board has published the
  [draft of its 2026 strategic plan](https://pyfound.blogspot.com/2026/06/psf-strategic-plan-2026-draft-open-for.html):
  six organizational goals and four program goals spanning financial
  sustainability, supply chain security, and community empowerment. The feedback
  window is open through June 25, so if you've got thoughts, now's the time. The
  [2026 PSF Board election dates](https://pyfound.blogspot.com/2026/06/psf-board-election-dates-for-2026.html)
  are out too.

  As always, if you maintain a package or just like living on the edge, give the
  latest 3.15 beta a spin and [file any issues](https://github.com/python/cpython/issues)
  you find.
