number: 7
title: 'Core Dispatch #7'
slug: 2026-w27
period_start: '2026-06-19'
period_end: '2026-07-05'
editorial_notes: |
  Welcome back to Core Dispatch! This edition covers June 19 through July 5, 2026.
  Python 3.15.0 beta 3 landed on June 23, and beta 4 is up next on July 18, with
  3.13.15 and 3.14.7 following on August 4.

  Last edition, we covered the Steering Council's request that the experimental
  JIT chart its future through a Standards Track PEP. A new PEP has now been
  drafted and discussion has started: [PEP 836](https://peps.python.org/pep-0836/),
  "JIT Go Brrr: The Path to a Supported JIT Compiler for CPython," sketches what
  moving the JIT from experiment to supported feature could involve, from
  performance expectations to interop and tooling compatibility.

  PyCon US 2026 talk recordings have also started landing, and we've pulled a few
  from the core team into Core Team Musings below: Pablo Galindo Salgado and László
  Kiss Kollár on Python 3.15's new [Tachyon sampling profiler](https://youtu.be/f1x4X83CDSA),
  Thomas Wouters on the [past, present, and future of free-threaded Python](https://youtu.be/PZu6LyiZVbM),
  and Emma Smith on [Rust for CPython](https://youtu.be/42kibVnUHYE). Not everything
  is up yet, so expect more picks as the rest are published.

  On the packaging side, the inaugural
  [Packaging Council election dates](https://blog.python.org/2026/06/2026-packaging-council-election-dates/)
  are out. And looking ahead, [EuroPython 2026](https://ep2026.europython.eu/)
  kicks off July 13, so expect a wave of talks and Language Summit coverage to
  pull from in a future edition.

  As always, if you maintain a package or just like living on the edge, give the
  latest 3.15 beta a spin and [file any issues](https://github.com/python/cpython/issues)
  you find.
