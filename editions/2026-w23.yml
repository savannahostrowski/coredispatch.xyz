number: 5
title: 'Core Dispatch #5'
slug: 2026-w23
period_start: '2026-05-18'
period_end: '2026-06-04'
editorial_notes: |
  Welcome back to Core Dispatch! This edition covers May 18 through June 4, 2026.
  As promised, Python 3.15.0 beta 2 landed on June 2. Two more
  milestones are close behind: 3.13.14 and 3.14.6 on June 9, followed by
  3.15.0 beta 3 on June 23.

  There's also a healthy batch of changes landing for 3.15: an O(n^2) blowup in
  `unicodedata.normalize()` was fixed, the XML parser gained support for
  multi-byte encodings, and a round of deprecation warnings went in for the
  `ast` module and `abc`'s `abstractclassmethod`/`abstractstaticmethod`/`abstractproperty`.

  On the project side, the Python Security Response Team (PSRT) landed an
  [initial Python security policy](https://github.com/python/devguide/pull/1804)
  in the [Devguide](https://devguide.python.org/), giving the vulnerability reporting and response process a
  documented home. And dev builds of 3.15+ now report a version like
  `3.15.0b2+dev` instead of the old bare-plus `3.15.0b2+`, which
  [wasn't PEP 440-compliant](https://github.com/python/release-tools/pull/394).

  Looking ahead, the [EuroPython 2026 Language Summit](https://ep2026.europython.eu/language-summit/)
  topics are out, with a lineup spanning a Rust-for-CPython roadmap, the future
  of free-threading, garbage collection, and the buffer protocol.

  If you're interested in CPython internals, Victor Stinner has a great writeup on
  [free threading internals and reference counting](https://vstinner.github.io/free-threading-reference-counting.html)
  that's well worth your time.

  As always, if you maintain a package or just like living on the edge, give the
  latest 3.15 beta a spin and [file any issues](https://github.com/python/cpython/issues)
  you find.
