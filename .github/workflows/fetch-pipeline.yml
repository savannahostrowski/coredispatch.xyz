name: Fetch Pipeline

on:
  schedule:
    - cron: "0 6 * * 5" # Every Friday at 6 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Run pipeline
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run python -m app.pipeline.run

      - name: Check for new draft
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard drafts/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect edition number
        if: steps.check.outputs.changed == 'true'
        id: edition
        run: |
          DRAFT_FILE=$(ls -1 drafts/*.yml 2>/dev/null | head -1)
          NUMBER=$(grep -m1 '^number:' "$DRAFT_FILE" | awk '{print $2}')
          echo "number=$NUMBER" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ steps.edition.outputs.number }}"
          git config user.name "Core Dispatch Bot"
          git config user.email "bot@coredispatch.xyz"
          BRANCH="dispatch/$NUM"
          git checkout -b "$BRANCH"
          git add drafts/
          git commit -m "📝 Draft: Core Dispatch $NUM"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "📝 Core Dispatch $NUM" \
            --body "$(cat <<'EOF'
          Auto-generated by the Core Dispatch pipeline.

          Preview the draft at `/staging` after merging to main,
          then move the file from `drafts/` to `editions/` to publish.

          ## Review checklist
          - [ ] Edit editorial notes
          - [ ] Remove uninteresting items
          - [ ] Add community picks
          - [ ] Add a quote for "One More Thing"
          - [ ] Add credits
          - [ ] Double check all links work
          - [ ] Move from `drafts/` to `editions/` to publish
          EOF
          )" \
            --draft
