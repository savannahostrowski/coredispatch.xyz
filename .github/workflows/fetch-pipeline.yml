name: Fetch Pipeline

on:
  schedule:
    - cron: "0 6 * * 5" # Biweekly on Fridays at 6:00 UTC (odd ISO weeks only, see step below)
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Skip on even ISO weeks
        if: github.event_name == 'schedule'
        run: |
          WEEK=$(date -u +%V)
          if [ $((10#$WEEK % 2)) -eq 0 ]; then
            echo "Off-cycle (ISO week $WEEK). Biweekly runs on odd weeks."
            exit 78
          fi

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run pipeline
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run python -m app.pipeline.run

      - name: Check for new draft
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard drafts/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect edition number
        if: steps.check.outputs.changed == 'true'
        id: edition
        run: |
          DRAFT_FILE=$(ls -1 drafts/*.yml 2>/dev/null | head -1)
          NUMBER=$(grep -m1 '^number:' "$DRAFT_FILE" | awk '{print $2}')
          echo "number=$NUMBER" >> $GITHUB_OUTPUT

      - name: Push draft branch
        if: steps.check.outputs.changed == 'true'
        run: |
          NUM="${{ steps.edition.outputs.number }}"
          git config user.name "Core Dispatch Bot"
          git config user.email "bot@coredispatch.xyz"
          BRANCH="dispatch/$NUM"
          git checkout -b "$BRANCH"
          git add drafts/
          git commit -m "📝 Draft: Core Dispatch $NUM"
          git push -u origin "$BRANCH"
