name: Deploy to FastAPI Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure directories exist
        run: |
          mkdir -p editions
          mkdir -p drafts

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          NEXT_PUBLIC_API_URL="" bun run build

      - name: Copy frontend build to backend static dir
        run: cp -r frontend/out backend/app/static

      - name: Copy editions to backend
        run: cp -r editions backend/editions

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Deploy to FastAPI Cloud
        working-directory: backend
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
          EDITIONS_DIR: /app/editions
        run: uv run fastapi deploy
