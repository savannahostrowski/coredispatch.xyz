name: Deploy to FastAPI Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'editions/**'
      - 'drafts/**'
      - 'official.yml'
      - 'core-blogs.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Ensure directories exist
        run: |
          mkdir -p editions
          mkdir -p drafts

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Copy frontend build to backend static dir
        run: cp -r frontend/dist backend/app/static

      - name: Copy editions to backend
        run: cp -r editions backend/editions

      - name: Copy feed manifests to backend
        run: |
          cp official.yml backend/official.yml
          cp core-blogs.yml backend/core-blogs.yml

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Deploy to FastAPI Cloud
        working-directory: backend
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: uv run fastapi deploy
