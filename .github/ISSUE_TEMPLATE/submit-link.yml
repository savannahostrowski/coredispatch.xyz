name: Submit a Link
description: Suggest a link for an upcoming edition of Core Dispatch
title: "[Submit] Title of the link"
labels: ["submission"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: section
    attributes:
      label: Section
      description: Where should this go in the edition?
      options:
        - Community
        - Core Team Musings
        - One More Thing (quote)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Why is this interesting?
      placeholder: A sentence or two about why this is worth including.
    validations:
      required: false
